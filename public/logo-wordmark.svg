<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" role="img" aria-label="PulseClose">
  <title>PulseClose</title>
  <!-- Mark: navy rounded square + blue pulse waveform -->
  <rect x="2" y="2" width="52" height="52" rx="12" fill="#0F172A"/>
  <path
    d="M 8 30 L 19 30 L 22 30 L 25 14 L 28 44 L 33 22 L 37 30 L 48 30"
    fill="none"
    stroke="#3B82F6"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Wordmark: Pulse (navy) + Close (blue) -->
  <text
    x="68"
    y="38"
    font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif"
    font-weight="700"
    font-size="26"
    letter-spacing="-0.5"
    fill="#0F172A"
  >Pulse<tspan fill="#3B82F6">Close</tspan></text>
</svg>
